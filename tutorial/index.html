<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BSVA AI — Guided Tour</title>
  <meta name="color-scheme" content="dark light">
  <meta name="description" content="A 10-minute interactive tour of BSVA's AI structure.">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- Topbar: brand · progress-dots · theme toggle -->
  <header class="topbar">
    <a class="brand" href="./" aria-label="BSVA AI — Guided Tour">
      <img class="brand-logo brand-logo--dark" src="./assets/brand/logo-white-linear.svg" alt="BSVA" width="86" height="22">
      <img class="brand-logo brand-logo--light" src="./assets/brand/logo-blue-linear.svg" alt="BSVA" width="86" height="22">
      <span class="brand-divider" aria-hidden="true"></span>
      <div>
        <div class="brand-title">AI</div>
        <div class="brand-sub">Guided Tour</div>
      </div>
    </a>

    <div class="progress-dots" id="progress-dots" role="navigation" aria-label="Tutorial sections"></div>

    <div class="topbar-actions">
      <button class="icon-btn" id="theme-toggle" title="Toggle theme" aria-label="Toggle theme">
        <svg id="icon-moon" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
        </svg>
        <svg id="icon-sun" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none">
          <circle cx="12" cy="12" r="4"></circle>
          <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"></path>
        </svg>
      </button>
    </div>
  </header>

  <!-- Main content area -->
  <main class="layout">
    <div class="content section-enter" id="content" aria-live="polite">
      <div class="loading">Loading the tour…</div>
    </div>
  </main>

  <!-- Bottom nav: prev · position · next -->
  <nav class="bottom-nav" aria-label="Section navigation">
    <button class="btn btn-ghost" id="prev-btn">
      <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
      Previous
    </button>
    <div class="bottom-nav-center">
      <span class="kbd-hint"><kbd>←</kbd> <kbd>→</kbd> to navigate</span>
    </div>
    <button class="btn btn-primary" id="next-btn">
      Next
      <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6l6 6-6 6"/></svg>
    </button>
  </nav>

  <!-- file:// fallback template -->
  <template id="file-protocol-template">
    <div class="error-card">
      <h2>This page needs a local server</h2>
      <p>Browsers block loading partials from <code>file://</code>. Run the bundled launcher:</p>
      <pre><code>cd ~/bsva-ai-structure/tutorial
./start.sh      # macOS / Linux
./start.ps1     # Windows</code></pre>
      <p>Or, from the <strong>repo root</strong> (one level up from <code>tutorial/</code>), run <code>python3 -m http.server 8765</code> and open <code>http://localhost:8765/tutorial/</code>.</p>
    </div>
  </template>

  <script>
    window.__MERMAID_SRC = "https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js";
  </script>
  <script src="scripts.js"></script>
</body>
</html>
